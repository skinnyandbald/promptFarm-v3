name: Claude AI Code Review

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write  # Required for OIDC authentication with Claude Code Action

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Only run if @claude is mentioned or on new PRs
    if: |
      (github.event_name == 'pull_request') ||
      (contains(github.event.comment.body, '@claude'))
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, json, tokenizer, bcmath
          coverage: none
      
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader
      
      - name: Claude AI Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Please review this Laravel 12 pull request and provide feedback on:
            - Laravel best practices and conventions
            - Code quality and maintainability
            - Security vulnerabilities
            - Performance optimizations
            - Advisor generation logic
            - Template processing accuracy
            - Quality validation implementation
            
            Context: This is an advisor generation system with:
            - PI (Project Instructions) generation with template substitution + LLM enhancement
            - PK (Project Knowledge) generation using LLM
            - Quality validation scoring system
            - Template variable mapping and HTML comment processing
            
            Use the repository's CLAUDE.md for guidance on Laravel conventions.
            Be constructive and helpful in your feedback.
            Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
          
          claude_args: '--allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'
            
      - name: Post review summary
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const review_status = '${{ steps.claude-review.outcome }}';
            
            let emoji = review_status === 'success' ? '✅' : '⚠️';
            let status = review_status === 'success' ? 'completed' : 'needs attention';
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${emoji} Claude AI code review ${status}. Check the review comments above for details.`
            });
      
      - name: Label PR based on review
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [];
            const review_status = '${{ steps.claude-review.outcome }}';
            
            if (review_status === 'success') {
              labels.push('claude-approved');
            } else {
              labels.push('needs-review');
            }
            
            if (labels.length > 0) {
              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: labels
              });
            }